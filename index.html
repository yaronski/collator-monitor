<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collator Monitor</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0d;
  --bg2:     #1a1a1a;
  --bg3:     #242424;
  --bg4:     #2e2e2e;
  --border:  rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.18);
  --text:    #f0ede8;
  --text2:   #a0a0a0;
  --text3:   #707070;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'DM Sans', system-ui, sans-serif;
  --green:   #4ade80;
  --green-d: #166534;
  --green-bg:#052e16;
  --red:     #f87171;
  --red-d:   #991b1b;
  --red-bg:  #2d0a0a;
  --amber:   #fbbf24;
  --amber-bg:#1c1200;
  --purple:  #a78bfa;
  --orange:  #fb923c;
  --radius:  8px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  line-height: 1.5;
}

.topbar {
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.04em; }
.logo span { color: var(--text3); margin: 0 6px; }
.indicator { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.indicator.live  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s ease-in-out infinite; }
.indicator.error { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
.topbar-right { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: right; line-height: 1.4; }
.page { max-width: 860px; margin: 0 auto; padding: 32px 24px 64px; }

.stats {
  display: flex; gap: 1px; margin-bottom: 28px;
  background: var(--border); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.stat { flex: 1; padding: 14px 18px; background: var(--bg2); }
.stat.ok   { background: rgba(74, 222, 128, 0.03); }
.stat.bad  { background: rgba(248, 113, 113, 0.04); }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.stat-value { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--text); }

.section-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.cards { display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--bg3); border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius); padding: 18px 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.card.network-moonbeam {
  border-left: 4px solid var(--purple);
  background: linear-gradient(135deg, rgba(167,139,250,0.1) 0%, var(--bg3) 40%);
}
.card.network-moonriver {
  border-left: 4px solid var(--orange);
  background: linear-gradient(135deg, rgba(251,146,60,0.1) 0%, var(--bg3) 40%);
}
.card.status-inactive { border-color: var(--red-d); background: #1a1212; }
.card.status-error    { border-color: rgba(251,191,36,0.25); }

.card-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.card-label { font-size: 14px; font-weight: 500; color: var(--text); }
.card-addr { font-family: var(--mono); font-size: 11px; color: var(--text3); word-break: break-all; flex: 1; min-width: 0; }
.card-addr a { color: var(--text3); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #444; }

.card-rank {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  flex-shrink: 0; letter-spacing: 0.02em;
}
.card-rank .rank-num { font-size: 13px; font-weight: 600; color: var(--text2); }

.status-badge {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 3px; letter-spacing: 0.04em; flex-shrink: 0;
}
.status-badge.active   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-d); }
.status-badge.inactive { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-d); }
.status-badge.error    { background: var(--amber-bg); color: var(--amber); border: 1px solid #78350f; }

.card-meta {
  display: flex; gap: 20px; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border); flex-wrap: wrap;
}
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-key { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
.meta-val { font-family: var(--mono); font-size: 13px; color: var(--text); }
.meta-val.highlight { color: var(--red); }
.meta-val.muted     { color: var(--text3); }
.net-label { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; }
.net-label.moonbeam  { color: var(--purple); }
.net-label.moonriver { color: var(--orange); }

.card-error { margin-top: 8px; font-size: 12px; color: var(--amber); font-family: var(--mono); }

.ranking { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

.sparkline { margin: 0 0 10px; }
.sparkline-track {
  position: relative; height: 4px; background: var(--bg4);
  border-radius: 2px;
}
.sparkline-dot {
  position: absolute; top: -3px; width: 10px; height: 10px;
  border-radius: 50%; transform: translateX(-50%);
}
.sparkline-dot.safe   { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.5); }
.sparkline-dot.caution { background: var(--amber); box-shadow: 0 0 4px rgba(251,191,36,0.4); }
.sparkline-dot.danger  { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.5); }
.sparkline-labels {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 9px; color: var(--text3);
  margin-top: 3px;
}

.ranking-table { width: 100%; font-family: var(--mono); font-size: 11px; border-collapse: collapse; table-layout: fixed; }
.ranking-table th {
  font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
  padding: 0 0 4px 0; font-weight: 400; text-align: right;
}
.ranking-table th:nth-child(1) { width: 32px; text-align: left; }
.ranking-table th:nth-child(2) { text-align: left; }
.ranking-table th:nth-child(3),
.ranking-table th:nth-child(4),
.ranking-table th:nth-child(5),
.ranking-table th:nth-child(6) { text-align: right; }
.ranking-table td { padding: 3px 0; vertical-align: middle; white-space: nowrap; }
.ranking-table td:nth-child(1) { color: var(--text3); text-align: left; }
.ranking-table td:nth-child(2) { text-align: left; overflow: hidden; text-overflow: ellipsis; }
.ranking-table td:nth-child(3),
.ranking-table td:nth-child(4),
.ranking-table td:nth-child(5),
.ranking-table td:nth-child(6) { text-align: right; }
.ranking-table td:nth-child(4) { color: var(--text2); }
.ranking-table tr.self td { color: var(--text); font-weight: 500; background: rgba(255,255,255,0.03); }
.ranking-table .gap-ahead  { color: var(--green); }
.ranking-table .gap-behind { color: var(--red); }
.ranking-table .margin-safe   { color: var(--green); }
.ranking-table .margin-danger { color: var(--red); }
.ranking-table .addr-link { color: var(--text2); text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #444; }

.threshold-section { margin-top: 6px; padding-top: 6px; border-top: 1px dashed rgba(255,255,255,0.12); }
.threshold-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px; font-family: var(--mono); font-size: 9px;
  color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
}
.threshold-header::before, .threshold-header::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
}

.fullset-btn {
  display: block; width: 100%; margin-top: 8px;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  cursor: pointer; padding: 6px 0; border: none; background: none;
  text-align: center; letter-spacing: 0.03em;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.fullset-btn:hover { color: var(--text); }

.fullset-wrap {
  display: none; margin-top: 8px;
  max-height: 360px; overflow-y: auto;
  border: 1px solid rgba(255,255,255,0.06); border-radius: 4px;
}
.fullset-wrap::-webkit-scrollbar { width: 4px; }
.fullset-wrap::-webkit-scrollbar-track { background: transparent; }
.fullset-wrap::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

.fullset-table {
  width: 100%; font-family: var(--mono); font-size: 10px;
  border-collapse: collapse; table-layout: fixed;
}
.fullset-table th {
  font-size: 8px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.06em; padding: 4px 6px; font-weight: 400;
  text-align: right; position: sticky; top: 0; background: var(--bg3);
  border-bottom: 1px solid var(--border);
}
.fullset-table th:nth-child(1) { width: 30px; text-align: left; }
.fullset-table th:nth-child(2) { text-align: left; }
.fullset-table td { padding: 2px 6px; vertical-align: middle; }
.fullset-table td:nth-child(1) { color: var(--text3); text-align: left; font-size: 9px; }
.fullset-table td:nth-child(2) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fullset-table td:nth-child(3) { text-align: right; white-space: nowrap; }
.fullset-table tr.self td { color: var(--text); font-weight: 500; background: rgba(74,222,128,0.05); }
.fullset-table tr.cutoff td { border-top: 1px dashed rgba(255,255,255,0.15); color: var(--text2); }
.fullset-table .addr-link { color: var(--text2); text-decoration: none; }
.fullset-table .addr-link:hover { text-decoration: underline; }

.stake-bar-wrap { display: inline-block; width: 50px; height: 3px; background: rgba(255,255,255,0.04); border-radius: 1px; vertical-align: middle; margin-left: 4px; }
.stake-bar-fill { display: block; height: 100%; border-radius: 1px; background: var(--text3); opacity: 0.3; }
.fullset-table tr.self .stake-bar-fill { background: var(--green); opacity: 0.6; }
.fullset-table tr.cutoff .stake-bar-fill { background: var(--amber); opacity: 0.4; }

.alert-banner { display: none; background: var(--red-bg); border: 1px solid var(--red-d); border-radius: var(--radius); padding: 12px 18px; margin-bottom: 20px; color: var(--red); font-size: 13px; }
.alert-banner.show { display: block; }
.alert-banner strong { font-weight: 500; }
.empty { text-align: center; padding: 60px 0; color: var(--text3); font-size: 13px; line-height: 1.8; }

.footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: var(--mono); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
.footer a { color: inherit; text-decoration: underline; text-decoration-color: #444; }

.refresh-wrap { margin-bottom: 24px; }
.refresh-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.refresh-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.refresh-bar-fill { height: 100%; background: var(--text3); transition: width 1s linear; }

@media (max-width: 640px) {
  .topbar { padding: 0 16px; height: 48px; }
  .page { padding: 20px 14px 48px; }
  .card { padding: 14px 16px; }
  .card-row { gap: 8px; }
  .card-addr { font-size: 10px; }
  .card-meta { gap: 14px; }
  .meta-val { font-size: 12px; }
  .ranking-table { font-size: 10px; }
  .ranking-table td, .ranking-table th { white-space: normal; word-break: break-word; }
  .fullset-table { font-size: 9px; }
  .fullset-table td, .fullset-table th { white-space: normal; word-break: break-word; }
  .stats { flex-direction: column; }
  .stat { padding: 10px 14px; }
  .stat-value { font-size: 18px; }
  .footer { flex-direction: column; gap: 4px; }
  .stake-bar-wrap { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">COLLATOR<span>/</span>MONITOR</div>
    <div class="indicator" id="liveIndicator"></div>
  </div>
  <div class="topbar-right" id="topbarMeta">loading\u2026</div>
</div>

<div class="page">
  <div class="refresh-wrap">
    <div class="refresh-label">Auto-refresh <span id="countdownText">5:00</span></div>
    <div class="refresh-bar"><div class="refresh-bar-fill" id="refreshFill" style="width:100%"></div></div>
  </div>
  <div class="alert-banner" id="alertBanner"></div>

  <div class="stats" id="statsRow">
    <div class="stat ok" id="statActiveBox"><div class="stat-label">Active</div><div class="stat-value" id="statActive">\u2013</div></div>
    <div class="stat" id="statInactiveBox"><div class="stat-label">Not in set</div><div class="stat-value" id="statInactive">\u2013</div></div>
    <div class="stat" id="statErrorBox"><div class="stat-label">Errors</div><div class="stat-value" id="statError">\u2013</div></div>
  </div>

  <div class="section-label">Collators</div>
  <div class="cards" id="cardList"><div class="empty">Loading status\u2026</div></div>

  <div class="footer">
    <span>Precompile <a href="https://moonbeam.moonscan.io/address/0x0000000000000000000000000000000000000800" target="_blank">0x\u2026800</a> \u00B7 isSelectedCandidate + awardedPoints</span>
    <span><a href="https://github.com/yaronski/collator-monitor" target="_blank">Source on GitHub</a> \u00B7 Updated by GitHub Actions every hour</span>
  </div>
</div>

<script>
const REFRESH_MS = 5 * 60 * 1000;
let countdownInterval, countdownSec;
const expandedCards = {};

function fmt(iso) {
  if (!iso) return '\u2013';
  return new Date(iso).toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function ago(iso) {
  if (!iso) return '\u2013';
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}
function statusLabel(s) {
  return { active:'ACTIVE', inactive:'NOT IN SET', error:'ERROR' }[s] || s.toUpperCase();
}

function setIndicator(state) { document.getElementById('liveIndicator').className = 'indicator ' + state; }

function renderStats(collators) {
  const v = Object.values(collators);
  const ac = v.filter(c => c.isActive).length;
  const ic = v.filter(c => c.statusText === 'inactive').length;
  const ec = v.filter(c => c.statusText === 'error').length;
  document.getElementById('statActive').textContent = ac;
  document.getElementById('statInactive').textContent = ic;
  document.getElementById('statError').textContent = ec;
  document.getElementById('statActiveBox').className = 'stat' + (ac > 0 ? ' ok' : '');
  document.getElementById('statInactiveBox').className = 'stat' + (ic > 0 ? ' bad' : '');
  document.getElementById('statErrorBox').className = 'stat' + (ec > 0 ? ' bad' : '');
}

function sparklineHtml(rank, total) {
  if (!rank || !total || total < 2) return '';
  const pct = ((rank - 1) / (total - 1)) * 100;
  const dotClass = pct < 70 ? 'safe' : pct < 90 ? 'caution' : 'danger';
  return '<div class="sparkline">'
    + '<div class="sparkline-track"><div class="sparkline-dot ' + dotClass + '" style="left:' + pct.toFixed(1) + '%"></div></div>'
    + '<div class="sparkline-labels"><span>#1</span><span>#' + total + '</span></div>'
    + '</div>';
}

function renderRanking(col, fullRanking) {
  const r = col.ranking;
  if (!r) return '';
  const subscanBase = col.network === 'moonbeam' ? 'https://moonbeam.moonscan.io/address/' : 'https://moonriver.moonscan.io/address/';
  const token = col.network === 'moonbeam' ? 'GLMR' : 'MOVR';
  const cardKey = col.network + '-' + col.address.slice(2, 12);

  let html = '<div class="ranking">';

  if (r.rank && r.totalSelected) {
    html += sparklineHtml(r.rank, r.totalSelected);
  }

  if (r.neighbors && r.neighbors.length) {
    const hasUsd = r.neighbors.some(n => n.gapUsd);
    const rows = r.neighbors.map(n => {
      const name = n.name || (n.address.slice(0, 6) + '\u2026' + n.address.slice(-4));
      const addrHtml = n.isSelf
        ? '<td>' + name + '</td>'
        : '<td><a href="' + subscanBase + n.address + '" target="_blank" class="addr-link">' + name + '</a></td>';
      let gapCell = '';
      if (n.isSelf) {
        gapCell = '<td></td><td></td>' + (hasUsd ? '<td></td>' : '');
      } else {
        const gapClass = n.gap.startsWith('+') ? 'gap-ahead' : n.gap.startsWith('-') ? 'gap-behind' : '';
        gapCell = '<td class="' + gapClass + '">' + n.gap + ' ' + token + '</td>'
          + '<td class="' + gapClass + '">' + (n.gapPercent || '') + '</td>'
          + (hasUsd ? '<td class="' + gapClass + '">' + (n.gapUsd || '') + '</td>' : '');
      }
      return '<tr class="' + (n.isSelf ? 'self' : '') + '">'
        + '<td>#' + n.rank + '</td>' + addrHtml
        + '<td style="text-align:right">' + n.stakeFormatted + ' ' + token + '</td>'
        + gapCell + '</tr>';
    }).join('');

    const thCols = '<th>#</th><th style="text-align:left">Collator</th><th>Stake</th><th>Gap</th><th>%</th>'
      + (hasUsd ? '<th>USD</th>' : '');
    html += '<table class="ranking-table"><tr>' + thCols + '</tr>' + rows + '</table>';
  }

  if (r.threshold) {
    const t = r.threshold;
    const tName = t.name || (t.address.slice(0, 6) + '\u2026' + t.address.slice(-4));
    const marginClass = t.margin && !t.margin.startsWith('-') ? 'margin-safe' : 'margin-danger';

    html += '<div class="threshold-section">';
    html += '<div class="threshold-header">Cutoff (#' + t.rank + ')</div>';
    html += '<table class="ranking-table"><tr>';
    html += '<td>#' + t.rank + '</td>';
    html += '<td><a href="' + subscanBase + t.address + '" target="_blank" class="addr-link">' + tName + '</a></td>';
    html += '<td style="text-align:right">' + t.stakeFormatted + ' ' + token + '</td>';
    if (t.margin) {
      html += '<td class="' + marginClass + '">' + t.margin + ' ' + token + '</td>';
      html += '<td class="' + marginClass + '">' + (t.marginPercent || '') + '</td>';
      html += (t.marginUsd ? '<td class="' + marginClass + '">' + t.marginUsd + '</td>' : '');
    } else {
      html += '<td colspan="3" style="color:var(--text3);text-align:center;font-size:9px">\u2190 minimum to enter set</td>';
    }
    html += '</tr></table></div>';
  }

  if (fullRanking && fullRanking.length > 0) {
    const isExp = expandedCards[cardKey];
    html += '<button class="fullset-btn" id="fullbtn-' + cardKey + '" onclick="toggleFullSet(\'' + cardKey + '\',' + fullRanking.length + ')">'
      + (isExp ? '\u25BE Hide full set' : '\u25B8 Show all ' + fullRanking.length + ' collators')
      + '</button>';

    const maxStake = fullRanking[0].stakeEther || 1;
    const total = r.totalSelected || fullRanking.length;
    const selfAddr = col.address.toLowerCase();
    const fsRows = fullRanking.map(entry => {
      const eName = entry.address.slice(0, 6) + '\u2026' + entry.address.slice(-4);
      const isSelf = entry.address === selfAddr;
      const isCutoff = entry.rank === total;
      const barPct = Math.max(1, Math.round((entry.stakeEther / maxStake) * 100));
      return '<tr class="' + (isSelf ? 'self' : '') + (isCutoff ? ' cutoff' : '') + '">'
        + '<td>' + entry.rank + '</td>'
        + '<td>' + (isSelf ? (col.label || eName) : '<a href="' + subscanBase + entry.address + '" target="_blank" class="addr-link">' + eName + '</a>') + '</td>'
        + '<td>' + entry.stakeFormatted + ' ' + token
        + ' <span class="stake-bar-wrap"><span class="stake-bar-fill" style="width:' + barPct + '%"></span></span>'
        + '</td></tr>';
    }).join('');

    html += '<div class="fullset-wrap" id="fullset-' + cardKey + '" style="display:' + (isExp ? 'block' : 'none') + '">';
    html += '<table class="fullset-table">';
    html += '<thead><tr><th>#</th><th style="text-align:left">Collator</th><th>Stake</th></tr></thead>';
    html += '<tbody>' + fsRows + '</tbody></table></div>';
  }

  html += '</div>';
  return html;
}

function toggleFullSet(key, total) {
  expandedCards[key] = !expandedCards[key];
  var wrap = document.getElementById('fullset-' + key);
  var btn = document.getElementById('fullbtn-' + key);
  if (expandedCards[key]) {
    wrap.style.display = 'block';
    btn.innerHTML = '\u25BE Hide full set';
  } else {
    wrap.style.display = 'none';
    btn.innerHTML = '\u25B8 Show all ' + total + ' collators';
  }
}

function renderCards(collators, allRankings) {
  var list = document.getElementById('cardList');
  var entries = Object.values(collators);
  if (!entries.length) {
    list.innerHTML = '<div class="empty">No collators in status.json yet.<br>Add an address to config.json and run the GitHub Actions workflow.</div>';
    return;
  }
  var statusOrder = { inactive:0, error:1, active:3 };
  var networkOrder = { moonbeam:0, moonriver:1 };
  entries.sort(function(a,b) {
    var n = (networkOrder[a.network]||9) - (networkOrder[b.network]||9);
    return n !== 0 ? n : (statusOrder[a.statusText]||9) - (statusOrder[b.statusText]||9);
  });

  list.innerHTML = entries.map(function(col) {
    var st = col.statusText || 'error';
    var label = col.label || col.address;
    var pts = col.points != null ? col.points : '\u2013';
    var consec = col.consecutiveInactive > 0
      ? '<div class="meta-item"><div class="meta-key">Consec. inactive</div><div class="meta-val highlight">' + col.consecutiveInactive + '</div></div>'
      : '';
    var subscanBase = col.network === 'moonbeam' ? 'https://moonbeam.moonscan.io/address/' : 'https://moonriver.moonscan.io/address/';
    var networkLabel = col.network === 'moonbeam' ? 'Moonbeam' : 'Moonriver';
    var rankHtml = (col.ranking && col.ranking.rank)
      ? '<span class="card-rank"><span class="rank-num">#' + col.ranking.rank + '</span> of ' + col.ranking.totalSelected + '</span>'
      : '';
    var fullRanking = allRankings[col.network] || null;

    return '<div class="card status-' + st + ' network-' + col.network + '">'
      + '<div class="card-row">'
      + '<div class="card-label">' + label + '</div>'
      + '<div class="card-addr"><a href="' + subscanBase + col.address + '" target="_blank">' + col.address + '</a></div>'
      + rankHtml
      + '<span class="status-badge ' + st + '">' + statusLabel(st) + '</span>'
      + '</div>'
      + '<div class="card-meta">'
      + '<div class="meta-item"><div class="meta-key">Network</div><div class="meta-val net-label ' + col.network + '">' + networkLabel + '</div></div>'
      + '<div class="meta-item"><div class="meta-key">Round</div><div class="meta-val ' + (!col.isActive ? 'highlight' : '') + '">' + (col.currentRound || '\u2013') + '</div></div>'
      + '<div class="meta-item"><div class="meta-key">Points this round</div><div class="meta-val">' + pts + '</div></div>'
      + consec
      + '</div>'
      + renderRanking(col, fullRanking)
      + (col.lastError ? '<div class="card-error">\u2717 ' + col.lastError + '</div>' : '')
      + '</div>';
  }).join('');
}

function renderAlert(collators) {
  var banner = document.getElementById('alertBanner');
  var inactive = Object.values(collators).filter(function(c) { return c.statusText === 'inactive'; });
  if (!inactive.length) { banner.classList.remove('show'); return; }
  var names = inactive.map(function(c) { return '<strong>' + (c.label || c.address) + '</strong>'; }).join(', ');
  banner.innerHTML = '\u26A0 ' + inactive.length + ' collator' + (inactive.length > 1 ? 's are' : ' is') + ' NOT in the active set: ' + names;
  banner.classList.add('show');
}

async function load() {
  try {
    var res = await fetch('status.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    var collators = data.collators || {};
    var allRankings = data.rankings || {};
    var hasIssue = Object.values(collators).some(function(c) { return c.statusText === 'inactive'; });
    var hasError = Object.values(collators).some(function(c) { return c.statusText === 'error'; });
    setIndicator(hasIssue ? 'error' : hasError ? 'stale' : 'live');
    document.getElementById('topbarMeta').innerHTML =
      'Updated ' + ago(data.lastUpdated) + '<br>' + fmt(data.lastUpdated);
    renderStats(collators);
    renderCards(collators, allRankings);
    renderAlert(collators);
  } catch (err) {
    setIndicator('error');
    document.getElementById('topbarMeta').textContent = 'fetch error';
    document.getElementById('cardList').innerHTML = '<div class="empty">Could not load status.json<br><span style="color:var(--amber);font-family:var(--mono);font-size:11px">' + err.message + '</span></div>';
  }
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdownSec = REFRESH_MS / 1000;
  var fill = document.getElementById('refreshFill');
  var countdownText = document.getElementById('countdownText');
  countdownInterval = setInterval(function() {
    countdownSec--;
    fill.style.width = Math.max(0, (countdownSec / (REFRESH_MS / 1000)) * 100) + '%';
    var m = Math.floor(countdownSec / 60);
    var s = countdownSec % 60;
    countdownText.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (countdownSec <= 0) { clearInterval(countdownInterval); load().then(startCountdown); }
  }, 1000);
}

load().then(startCountdown);
</script>
</body>
</html>
