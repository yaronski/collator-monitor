<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collator Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0d;
  --bg2:     #161616;
  --bg3:     #1e1e1e;
  --bg4:     #262626;
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #e8e6e0;
  --text2:   #888;
  --text3:   #555;
  --mono:    'JetBrains Mono', monospace;
  --sans:    'DM Sans', system-ui, sans-serif;
  --green:   #4ade80;
  --green-d: #166534;
  --green-bg:#052e16;
  --red:     #f87171;
  --red-d:   #991b1b;
  --red-bg:  #2d0a0a;
  --amber:   #fbbf24;
  --amber-bg:#1c1200;
  --blue:    #60a5fa;
  --blue-bg: #0a1929;
  --radius:  8px;
  --radius-sm: 5px;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
  line-height: 1.5;
}

/* ── Layout ──────────────────────────────────────────────────── */
.topbar {
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--text);
}

.logo span {
  color: var(--text3);
  margin: 0 6px;
}

.indicator {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
}
.indicator.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s ease-in-out infinite; }
.indicator.error { background: var(--red); }
.indicator.stale { background: var(--amber); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

.topbar-right {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  text-align: right;
  line-height: 1.4;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* ── Stats row ──────────────────────────────────────────────── */
.stats {
  display: flex;
  gap: 1px;
  margin-bottom: 28px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.stat {
  flex: 1;
  padding: 14px 18px;
  background: var(--bg2);
}
.stat-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.stat-value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 500;
}
.stat-value.ok   { color: var(--green); }
.stat-value.bad  { color: var(--red); }
.stat-value.warn { color: var(--amber); }
.stat-value.mute { color: var(--text); }

/* ── Collator cards ─────────────────────────────────────────── */
.section-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.cards { display: flex; flex-direction: column; gap: 8px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  transition: border-color 0.2s;
}
.card.status-inactive { border-color: var(--red-d); background: #140d0d; }
.card.status-warning  { border-color: rgba(251,191,36,0.25); background: #0f0d06; }
.card.status-error    { border-color: rgba(251,191,36,0.2); }

.card-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.active   { background: var(--green); box-shadow: 0 0 5px var(--green); }
.dot.inactive { background: var(--red); }
.dot.warning  { background: var(--amber); }
.dot.error    { background: var(--amber); }
.dot.loading  { background: var(--text3); animation: blink 1s infinite; }

.card-label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}

.card-addr {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  word-break: break-all;
  flex: 1;
  min-width: 0;
}

.net-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 3px;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.net-badge.moonbeam  { background: #1a1040; color: #a78bfa; border: 1px solid #4c1d95; }
.net-badge.moonriver { background: #1a0f05; color: #fb923c; border: 1px solid #7c2d12; }

.status-badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.status-badge.active   { background: var(--green-bg); color: var(--green);  border: 1px solid var(--green-d); }
.status-badge.inactive { background: var(--red-bg);   color: var(--red);    border: 1px solid var(--red-d); }
.status-badge.warning  { background: var(--amber-bg); color: var(--amber);  border: 1px solid #78350f; }
.status-badge.error    { background: var(--amber-bg); color: var(--amber);  border: 1px solid #78350f; }
.status-badge.loading  { background: var(--bg4);      color: var(--text3);  border: 1px solid var(--border2); }

.card-meta {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.meta-key {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.meta-val {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
}
.meta-val.highlight { color: var(--red); }
.meta-val.ok        { color: var(--green); }
.meta-val.muted     { color: var(--text3); }

.card-error {
  margin-top: 8px;
  font-size: 12px;
  color: var(--amber);
  font-family: var(--mono);
}

/* ── Alert banner ────────────────────────────────────────────── */
.alert-banner {
  display: none;
  background: var(--red-bg);
  border: 1px solid var(--red-d);
  border-radius: var(--radius);
  padding: 12px 18px;
  margin-bottom: 20px;
  color: var(--red);
  font-size: 13px;
}
.alert-banner.show { display: block; }
.alert-banner strong { font-weight: 500; }

/* ── Empty / loading states ──────────────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 0;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.8;
}

/* ── Footer ──────────────────────────────────────────────────── */
.footer {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}

/* ── Refresh bar ─────────────────────────────────────────────── */
.refresh-bar {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  overflow: hidden;
  margin-bottom: 24px;
}
.refresh-bar-fill {
  height: 100%;
  background: var(--text3);
  transition: width 1s linear;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">COLLATOR<span>/</span>MONITOR</div>
    <div class="indicator" id="liveIndicator"></div>
  </div>
  <div class="topbar-right" id="topbarMeta">loading…</div>
</div>

<div class="page">

  <div class="refresh-bar">
    <div class="refresh-bar-fill" id="refreshFill" style="width:100%"></div>
  </div>

  <div class="alert-banner" id="alertBanner"></div>

  <div class="stats" id="statsRow">
    <div class="stat"><div class="stat-label">Monitored</div><div class="stat-value mute" id="statTotal">–</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-value ok" id="statActive">–</div></div>
    <div class="stat"><div class="stat-label">Not in set</div><div class="stat-value bad" id="statInactive">–</div></div>
    <div class="stat"><div class="stat-label">Warnings</div><div class="stat-value warn" id="statWarn">–</div></div>
  </div>

  <div class="section-label">Collators</div>
  <div class="cards" id="cardList">
    <div class="empty">Loading status…</div>
  </div>

  <div class="footer">
    <span>Precompile: 0x0000000000000000000000000000000000000800 · isSelectedCandidate + awardedPoints</span>
    <span>Updated by GitHub Actions every 30 min</span>
  </div>

</div>

<script>
const REFRESH_MS = 5 * 60 * 1000; // re-fetch status.json every 5 min
let refreshTimer, countdownInterval, countdownSec;

function fmt(isoStr) {
  if (!isoStr) return '–';
  const d = new Date(isoStr);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function ago(isoStr) {
  if (!isoStr) return '–';
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 60)  return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return `${Math.floor(diff/3600)}h ago`;
}

function statusLabel(s) {
  return { active: 'ACTIVE', inactive: 'NOT IN SET', warning: 'IN SET · 0 PTS', error: 'ERROR' }[s] || s.toUpperCase();
}

function setIndicator(state) {
  const el = document.getElementById('liveIndicator');
  el.className = 'indicator ' + state;
}

function renderStats(collators) {
  const vals = Object.values(collators);
  document.getElementById('statTotal').textContent    = vals.length || '0';
  document.getElementById('statActive').textContent   = vals.filter(c => c.statusText === 'active').length;
  document.getElementById('statInactive').textContent = vals.filter(c => c.statusText === 'inactive').length;
  document.getElementById('statWarn').textContent     = vals.filter(c => c.statusText === 'warning').length;
}

function renderCards(collators) {
  const list = document.getElementById('cardList');
  const entries = Object.values(collators);

  if (!entries.length) {
    list.innerHTML = '<div class="empty">No collators in status.json yet.<br>Add an address to config.json and run the GitHub Actions workflow.</div>';
    return;
  }

  // Sort: inactive first, then warnings, then active
  const order = { inactive: 0, error: 1, warning: 2, active: 3 };
  entries.sort((a, b) => (order[a.statusText] ?? 9) - (order[b.statusText] ?? 9));

  list.innerHTML = entries.map(col => {
    const st    = col.statusText || 'error';
    const label = col.label || col.address;
    const pts   = col.points !== null && col.points !== undefined ? col.points : '–';
    const consec = col.consecutiveInactive > 0
      ? `<div class="meta-item"><div class="meta-key">Consec. inactive</div><div class="meta-val highlight">${col.consecutiveInactive}</div></div>`
      : '';

    return `
    <div class="card status-${st}">
      <div class="card-row">
        <div class="dot ${st}"></div>
        ${label !== col.address ? `<div class="card-label">${label}</div>` : ''}
        <div class="card-addr">${col.address}</div>
        <span class="net-badge ${col.network}">${col.network === 'moonbeam' ? 'MOONBEAM' : 'MOONRIVER'}</span>
        <span class="status-badge ${st}">${statusLabel(st)}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-key">Round</div>
          <div class="meta-val ${!col.isActive ? 'highlight' : ''}">${col.currentRound ?? '–'}</div>
        </div>
        <div class="meta-item">
          <div class="meta-key">Points this round</div>
          <div class="meta-val ${col.points === 0 && col.isActive ? 'muted' : col.points > 0 ? 'ok' : ''}">${pts}</div>
        </div>
        ${consec}
        <div class="meta-item">
          <div class="meta-key">Last checked</div>
          <div class="meta-val muted">${fmt(col.lastChecked)}</div>
        </div>
      </div>
      ${col.lastError ? `<div class="card-error">✗ ${col.lastError}</div>` : ''}
    </div>`;
  }).join('');
}

function renderAlert(collators) {
  const banner   = document.getElementById('alertBanner');
  const inactive = Object.values(collators).filter(c => c.statusText === 'inactive');
  if (!inactive.length) { banner.classList.remove('show'); return; }
  const names = inactive.map(c => `<strong>${c.label || c.address.slice(0,10)+'…'}</strong>`).join(', ');
  banner.innerHTML = `⚠ ${inactive.length} collator${inactive.length > 1 ? 's are' : ' is'} NOT in the active set: ${names}`;
  banner.classList.add('show');
}

async function load() {
  try {
    const res  = await fetch(`status.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const collators = data.collators || {};
    const hasIssue  = Object.values(collators).some(c => c.statusText === 'inactive');
    const hasWarn   = Object.values(collators).some(c => c.statusText === 'warning');

    setIndicator(hasIssue ? 'error' : hasWarn ? 'stale' : 'live');

    document.getElementById('topbarMeta').innerHTML =
      `Updated ${ago(data.lastUpdated)}<br>${fmt(data.lastUpdated)}`;

    renderStats(collators);
    renderCards(collators);
    renderAlert(collators);
  } catch (err) {
    setIndicator('error');
    document.getElementById('topbarMeta').textContent = 'fetch error';
    document.getElementById('cardList').innerHTML =
      `<div class="empty">Could not load status.json<br><span style="color:var(--amber);font-family:var(--mono);font-size:11px;">${err.message}</span></div>`;
  }
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdownSec = REFRESH_MS / 1000;
  const fill = document.getElementById('refreshFill');
  countdownInterval = setInterval(() => {
    countdownSec--;
    const pct = (countdownSec / (REFRESH_MS / 1000)) * 100;
    fill.style.width = Math.max(0, pct) + '%';
    if (countdownSec <= 0) {
      clearInterval(countdownInterval);
      load().then(startCountdown);
    }
  }, 1000);
}

load().then(startCountdown);
</script>
</body>
</html>
